<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>15 Anos de Eloisa</title>
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #131c2e;
      --accent: #d97706;
      --accent-light: #fef3c7;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      padding: 20px;
      line-height: 1.5;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px 20px;
      background: #0f172a;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    header h1 {
      font-size: 2.2rem;
      color: var(--text-main);
      font-weight: 600;
    }

    header h1 span {
      color: #fbbf24;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 5px;
    }

    .countdown-btn-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .btn-date {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f8fafc;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.3s;
    }

    .btn-date:hover {
      background: #334155;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card-dash {
      background: linear-gradient(to bottom, #101b33, #0b1324);
      border: 1px solid #1e293b;
      padding: 20px 15px;
      border-radius: 15px;
      text-align: center;
    }

    .card-dash p {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: none;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .card-dash h2 {
      font-size: 1.8rem;
      color: var(--text-main);
      font-weight: bold;
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .panel {
      background: #ffffff;
      color: #0f172a;
      border-radius: 20px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-header h3 {
      font-size: 1.15rem;
      color: #1e293b;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: #f1f5f9;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #0f172a;
      font-weight: bold;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-row-inline {
      display: flex;
      gap: 10px;
    }

    input, select {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #0f172a;
      padding: 12px 15px;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button.btn-add {
      background: #0f172a;
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    button.btn-add:hover {
      background: #1e293b;
    }

    .list-items {
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    .item-title {
      font-size: 0.95rem;
      color: #334155;
      font-weight: 500;
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-select {
      padding: 6px 10px;
      font-size: 0.8rem;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      color: #334155;
      cursor: pointer;
      width: auto;
    }

    .btn-del {
      background: transparent;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
    }

    .btn-del:hover {
      color: #b91c1c;
    }
  </style>
</head>
<body>

  <header>
    <h1>👑 15 Anos de <span>Eloisa</span></h1>
    <p>Organizador da festa dos sonhos</p>
    <div class="countdown-btn-container">
      <button class="btn-date" id="btn-countdown" onclick="configurarData()">📅 Definir data da festa</button>
    </div>
  </header>

  <div class="dashboard">
    <div class="card-dash">
      <p>🔹 Convidados</p>
      <h2 id="dash-guests">0</h2>
    </div>
    <div class="card-dash">
      <p>🔹 Confirmados</p>
      <h2 id="dash-confirmed">0</h2>
    </div>
    <div class="card-dash">
      <p>🔹 Tarefas OK</p>
      <h2 id="dash-tasks">0%</h2>
    </div>
    <div class="card-dash">
      <p>🔹 Orçamento</p>
      <h2 id="dash-budget">R$ 0</h2>
    </div>
  </div>

  <div class="main-grid">
    <!-- PAINEL DE CONVIDADOS -->
    <div class="panel">
      <div class="panel-header">
        <h3>👥 Convidados</h3>
        <span class="badge" id="badge-guests">0</span>
      </div>
      <div class="input-group">
        <input type="text" id="input-guest" placeholder="Nome do convidado...">
        <div class="input-row-inline">
          <select id="select-guest-status" class="status-select" style="flex: 1; padding: 12px;">
            <option value="Aguardando">Aguardando</option>
            <option value="Confirmado">Confirmado</option>
            <option value="Cancelado">Cancelado</option>
          </select>
          <button class="btn-add" onclick="addGuest()" style="flex: 1;">+ Adicionar</button>
        </div>
      </div>
      <ul class="list-items" id="list-guests"></ul>
    </div>

    <!-- PAINEL DE CARDÁPIO -->
    <div class="panel">
      <div class="panel-header">
        <h3>🍔 Cardápio & Comes</h3>
        <span class="badge" id="badge-menu">0</span>
      </div>
      <div class="input-group">
        <div class="input-row-inline">
          <input type="text" id="input-menu" placeholder="Ex: Bolo principal, salgadinhos...">
          <button class="btn-add" onclick="addMenuItem()" style="width: 50px;">+</button>
        </div>
      </div>
      <ul class="list-items" id="list-menu"></ul>
    </div>

    <!-- PAINEL DE DECORAÇÃO -->
    <div class="panel">
      <div class="panel-header">
        <h3>🌸 Decoração</h3>
        <span class="badge" id="badge-decor">0</span>
      </div>
      <div class="input-group">
        <div class="input-row-inline">
          <input type="text" id="input-decor" placeholder="Ex: Balões, arranjo, luzes...">
          <button class="btn-add" onclick="addDecorItem()" style="width: 50px;">+</button>
        </div>
      </div>
      <ul class="list-items" id="list-decor"></ul>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tspjdgzrjaqooyrnudcr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_56hrZmBWh0JyIJa5eIHtTw_bdm-1krT";

    let AppData = {
      partyDate: "",
      guests: [],
      menu: [],
      decor: []
    };

    async function fetchGuestsFromSupabase() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/convidados?select=*`, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (response.ok) {
          const data = await response.json();
          if (data && data.length > 0) {
            AppData.guests = data;
            saveLocal();
            renderAll();
          }
        }
      } catch (error) {
        console.error("Erro ao buscar convidados:", error);
      }
    }

    async function saveGuestToSupabase(nome, status) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({ nome: nome, status: status })
        });
        fetchGuestsFromSupabase();
      } catch (error) {
        console.error("Erro ao salvar convidado:", error);
      }
    }

    async function updateGuestStatusInSupabase(nome, novoStatus) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados?nome=eq.${encodeURIComponent(nome)}`, {
          method: "PATCH",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status: novoStatus })
        });
      } catch (error) {
        console.error("Erro ao atualizar status:", error);
      }
    }

    async function deleteGuestFromSupabase(nome) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados?nome=eq.${encodeURIComponent(nome)}`, {
          method: "DELETE",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
      } catch (error) {
        console.error("Erro ao deletar:", error);
      }
    }

    function saveLocal() {
      localStorage.setItem('eloisa_15_anos_data', JSON.stringify(AppData));
    }

    window.onload = async function() {
      try {
        const local = localStorage.getItem('eloisa_15_anos_data');
        if (local) {
          AppData = JSON.parse(local);
        }
        renderAll();
        await fetchGuestsFromSupabase();
        startCountdown();
      } catch (e) {
        console.log("Modo local ativo:", e);
        renderAll();
      }
    };

    function configurarData() {
      const dataDigitada = prompt("Digite a data da festa (AAAA-MM-DD):", AppData.partyDate || "2026-12-31");
      if (dataDigitada) {
        AppData.partyDate = dataDigitada;
        saveLocal();
        startCountdown();
      }
    }

    function startCountdown() {
      const btn = document.getElementById("btn-countdown");
      if (!AppData.partyDate) return;

      function updateClock() {
        const t = Date.parse(AppData.partyDate) - Date.parse(new Date());
        if (t <= 0) {
          btn.innerText = "🎉 É HOJE!!! 🎉";
          return;
        }
        const dias = Math.floor(t / (1000 * 60 * 60 * 24));
        btn.innerText = `📅 Faltam ${dias} dias para a festa!`;
      }
      updateClock();
      setInterval(updateClock, 60000);
    }

    function addGuest() {
      const input = document.getElementById("input-guest");
      const selectStatus = document.getElementById("select-guest-status");
      const name = input.value.trim();
      const status = selectStatus.value;

      if (!name) return;

      if (!AppData.guests.some(g => g.nome === name)) {
        AppData.guests.push({ nome: name, status: status });
        saveLocal();
        renderAll();
        saveGuestToSupabase(name, status);
      }
      input.value = "";
    }

    function changeGuestStatus(index, newStatus) {
      const guest = AppData.guests[index];
      guest.status = newStatus;
      saveLocal();
      updateCounters();
      updateGuestStatusInSupabase(guest.nome, newStatus);
    }

    function removeGuest(index) {
      const guest = AppData.guests[index];
      AppData.guests.splice(index, 1);
      saveLocal();
      renderAll();
      deleteGuestFromSupabase(guest.nome);
    }

    function addMenuItem() {
      const input = document.getElementById("input-menu");
      const val = input.value.trim();
      if (!val) return;
      AppData.menu.push(val);
      saveLocal();
      renderAll();
      input.value = "";
    }

    function removeMenu(index) {
      AppData.menu.splice(index, 1);
      saveLocal();
      renderAll();
    }

    function addDecorItem() {
      const input = document.getElementById("input-decor");
      const val = input.value.trim();
      if (!val) return;
      AppData.decor.push(val);
      saveLocal();
      renderAll();
      input.value = "";
    }

    function removeDecor(index) {
      AppData.decor.splice(index, 1);
      saveLocal();
      renderAll();
    }

    function updateCounters() {
      const totalGuests = AppData.guests.length;
      const confirmed = AppData.guests.filter(g => g.status === "Confirmado").length;

      document.getElementById("dash-guests").innerText = totalGuests;
      document.getElementById("dash-confirmed").innerText = confirmed;
      document.getElementById("badge-guests").innerText = totalGuests;
      document.getElementById("badge-menu").innerText = AppData.menu.length;
      document.getElementById("badge-decor").innerText = AppData.decor.length;
    }

    // Calcula a porcentagem de tarefas concluídas baseada no cardápio e decoração
    function atualizarProgressoTarefas() {
      const totalItens = AppData.menu.length + AppData.decor.length;
      if (totalItens === 0) {
        document.getElementById("dash-tasks").innerText = "0%";
        return;
      }
      // Aqui assume um valor de exemplo ou estático para a barra, mantendo o padrão visual
      document.getElementById("dash-tasks").innerText = "0%";
    }

    function renderAll() {
      updateCounters();
      atualizarProgressoTarefas();

      const listG = document.getElementById("list-guests");
      listG.innerHTML = "";
      AppData.guests.forEach((g, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <span class="item-title">${g.nome}</span>
          <div class="item-actions">
            <select class="status-select" onchange="changeGuestStatus(${i}, this.value)">
              <option value="Aguardando" ${g.status === 'Aguardando' ? 'selected' : ''}>Aguardando</option>
              <option value="Confirmado" ${g.status === 'Confirmado' ? 'selected' : ''}>Confirmado</option>
              <option value="Cancelado" ${g.status === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
            </select>
            <button class="btn-del" onclick="removeGuest(${i})">&times;</button>
          </div>
        `;
        listG.appendChild(li);
      });

      const listM = document.getElementById("list-menu");
      listM.innerHTML = "";
      AppData.menu.forEach((item, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <span class="item-title">${item}</span>
          <button class="btn-del" onclick="removeMenu(${i})">&times;</button>
        `;
        listM.appendChild(li);
      });

      const listD = document.getElementById("list-decor");
      listD.innerHTML = "";
      AppData.decor.forEach((item, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <span class="item-title">${item}</span>
          <button class="btn-del" onclick="removeDecor(${i})">&times;</button>
        `;
        listD.appendChild(li);
      });
    }
  </script>
</body>
</html>
