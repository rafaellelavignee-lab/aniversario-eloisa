<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>15 Anos de Eloisa</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent: #f59e0b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      padding: 20px;
      line-height: 1.5;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, var(--bg-secondary), #0f172a);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    header h1 {
      font-size: 2rem;
      color: var(--text-main);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .countdown-btn-container {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }

    .btn-date {
      background: transparent;
      border: 1px dashed var(--accent);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .btn-date:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card-dash {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card-dash p {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .card-dash h2 {
      font-size: 1.5rem;
      color: var(--text-main);
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .panel-header h3 {
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--bg-primary);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    input, select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    input {
      flex: 1;
    }

    input::placeholder {
      color: #64748b;
    }

    button.btn-add {
      background: var(--text-main);
      color: var(--bg-primary);
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.btn-add:hover {
      background: #e2e8f0;
    }

    .list-items {
      list-style: none;
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-primary);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-title {
      font-size: 0.9rem;
    }

    .item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-select {
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
      background: var(--bg-secondary);
      cursor: pointer;
    }

    .btn-del {
      background: transparent;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 5px;
    }

    .btn-del:hover {
      color: #f87171;
    }
  </style>
</head>
<body>

  <header>
    <h1>👑 15 Anos de <span>Eloisa</span></h1>
    <p>Organizador da festa dos sonhos</p>
    <div class="countdown-btn-container">
      <button class="btn-date" id="btn-countdown" onclick="configurarData()">📅 Definir data da festa</button>
    </div>
  </header>

  <div class="dashboard">
    <div class="card-dash">
      <p>👥 Convidados</p>
      <h2 id="dash-guests">0</h2>
    </div>
    <div class="card-dash">
      <p>✅ Confirmados</p>
      <h2 id="dash-confirmed">0</h2>
    </div>
    <div class="card-dash">
      <p>📋 Tarefas OK</p>
      <h2 id="dash-tasks">0%</h2>
    </div>
    <div class="card-dash">
      <p>💰 Orçamento</p>
      <h2 id="dash-budget">R$ 0</h2>
    </div>
  </div>

  <div class="main-grid">
    <!-- PAINEL DE CONVIDADOS -->
    <div class="panel">
      <div class="panel-header">
        <h3>👥 Convidados</h3>
        <span class="badge" id="badge-guests">0</span>
      </div>
      <div class="input-group">
        <input type="text" id="input-guest" placeholder="Nome do convidado...">
        <select id="select-guest-status" class="status-select" style="padding: 10px;">
          <option value="Aguardando">Aguardando</option>
          <option value="Confirmado">Confirmado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
        <button class="btn-add" onclick="addGuest()">+ Cadastrar</button>
      </div>
      <ul class="list-items" id="list-guests"></ul>
    </div>

    <!-- PAINEL DE CARDÁPIO -->
    <div class="panel">
      <div class="panel-header">
        <h3>🍔 Cardápio & Comes</h3>
        <span class="badge" id="badge-menu">0</span>
      </div>
      <div class="input-group">
        <input type="text" id="input-menu" placeholder="Ex: Bolo principal, salgadinho...">
        <button class="btn-add" onclick="addMenuItem()">+</button>
      </div>
      <ul class="list-items" id="list-menu"></ul>
    </div>

    <!-- PAINEL DE DECORAÇÃO -->
    <div class="panel">
      <div class="panel-header">
        <h3>🌸 Decoração</h3>
        <span class="badge" id="badge-decor">0</span>
      </div>
      <div class="input-group">
        <input type="text" id="input-decor" placeholder="Ex: Balões, arranjo, luzes...">
        <button class="btn-add" onclick="addDecorItem()">+</button>
      </div>
      <ul class="list-items" id="list-decor"></ul>
    </div>
  </div>

  <script>
    // CONFIGURAÇÃO DO SUPABASE CORRIGIDA
    const SUPABASE_URL = "https://tspjdgzrjaqooyrnudcr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_56hrZmBWh0JyIJa5eIHtTw_bdm-1krT";

    // Estrutura de dados local
    let AppData = {
      partyDate: "",
      guests: [],
      menu: [],
      decor: []
    };

    // BANCO DE DADOS - Buscar dados da Nuvem
    async function fetchGuestsFromSupabase() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/convidados?select=*`, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (response.ok) {
          const data = await response.json();
          if (data && data.length > 0) {
            AppData.guests = data;
            saveLocal();
            renderAll();
          }
        }
      } catch (error) {
        console.error("Erro ao buscar convidados:", error);
      }
    }

    // BANCO DE DADOS - Salvar novo convidado
    async function saveGuestToSupabase(nome, status) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({ nome: nome, status: status })
        });
        // Atualiza a lista local logo em seguida
        fetchGuestsFromSupabase();
      } catch (error) {
        console.error("Erro ao salvar convidado na nuvem:", error);
      }
    }

    // BANCO DE DADOS - Atualizar status do convidado
    async function updateGuestStatusInSupabase(nome, novoStatus) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados?nome=eq.${encodeURIComponent(nome)}`, {
          method: "PATCH",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status: novoStatus })
        });
      } catch (error) {
        console.error("Erro ao atualizar status na nuvem:", error);
      }
    }

    // BANCO DE DADOS - Deletar convidado
    async function deleteGuestFromSupabase(nome) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/convidados?nome=eq.${encodeURIComponent(nome)}`, {
          method: "DELETE",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
      } catch (error) {
        console.error("Erro ao deletar na nuvem:", error);
      }
    }

    // Salvamento Local (Cache de segurança)
    function saveLocal() {
      localStorage.setItem('eloisa_15_anos_data', JSON.stringify(AppData));
    }

    // Inicialização segura
    window.onload = async function() {
      try {
        const local = localStorage.getItem('eloisa_15_anos_data');
        if (local) {
          AppData = JSON.parse(local);
        }
        renderAll();
        // Carrega do banco sem travar a interface
        await fetchGuestsFromSupabase();
        startCountdown();
      } catch (e) {
        console.log("Modo local ativo:", e);
        renderAll();
      }
    };

    // Ações: Data / Countdown
    function configurarData() {
      const dataDigitada = prompt("Digite a data da festa (Formato: AAAA-MM-DD):", AppData.partyDate || "2026-12-31");
      if (dataDigitada) {
        AppData.partyDate = dataDigitada;
        saveLocal();
        startCountdown();
      }
    }

    function startCountdown() {
      const btn = document.getElementById("btn-countdown");
      if (!AppData.partyDate) return;

      function updateClock() {
        const t = Date.parse(AppData.partyDate) - Date.parse(new Date());
        if (t <= 0) {
          btn.innerText = "🎉 É HOJE!!! 🎉";
          return;
        }
        const dias = Math.floor(t / (1000 * 60 * 60 * 24));
        btn.innerText = `📅 Faltam ${dias} dias para a festa!`;
      }
      updateClock();
      setInterval(updateClock, 60000);
    }

    // Ações: Adicionar Itens
    function addGuest() {
      const input = document.getElementById("input-guest");
      const selectStatus = document.getElementById("select-guest-status");
      const name = input.value.trim();
      const status = selectStatus.value;

      if (!name) return;

      // Adiciona na memória local primeiro para resposta rápida
      if (!AppData.guests.some(g => g.nome === name)) {
        AppData.guests.push({ nome: name, status: status });
        saveLocal();
        renderAll();
        // Dispara para a nuvem
        saveGuestToSupabase(name, status);
      }
      input.value = "";
    }

    function changeGuestStatus(index, newStatus) {
      const guest = AppData.guests[index];
      guest.status = newStatus;
      saveLocal();
      updateCounters();
      updateGuestStatusInSupabase(guest.nome, newStatus);
    }

    function removeGuest(index) {
      const guest = AppData.guests[index];
      AppData.guests.splice(index, 1);
      saveLocal();
      renderAll();
      deleteGuestFromSupabase(guest.nome);
    }

    // Funções genéricas para Cardápio e Decoração
    function addMenuItem() {
      const input = document.getElementById("input-menu");
      const val = input.value.trim();
      if (!val) return;
      AppData.menu.push(val);
      saveLocal();
      renderAll();
      input.value = "";
    }

    function removeMenu(index) {
      AppData.menu.splice(index, 1);
      saveLocal();
      renderAll();
    }

    function addDecorItem() {
      const input = document.getElementById("input-decor");
      const val = input.value.trim();
      if (!val) return;
      AppData.decor.push(val);
      saveLocal();
      renderAll();
      input.value = "";
    }

    function removeDecor(index) {
      AppData.decor.splice(index, 1);
      saveLocal();
      renderAll();
    }

    // Renderização e Atualizações da Tela
    function updateCounters() {
      const totalGuests = AppData.guests.length;
      const confirmed = AppData.guests.filter(g => g.status === "Confirmado").length;

      document.getElementById("dash-guests").innerText = totalGuests;
      document.getElementById("dash-confirmed").innerText = confirmed;
      document.getElementById("badge-guests").innerText = totalGuests;
      document.getElementById("badge-menu").innerText = AppData.menu.length;
      document.getElementById("badge-decor").innerText = AppData.decor.length;
    }

    function renderAll() {
      updateCounters();

      // Lista de Convidados
      const listG = document.getElementById("list-guests");
      listG.innerHTML = "";
      AppData.guests.forEach((g, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <div class="item-info">
            <span class="item-title">${g.nome}</span>
          </div>
          <div class="item-actions">
            <select class="status-select" onchange="changeGuestStatus(${i}, this.value)">
              <option value="Aguardando" ${g.status === 'Aguardando' ? 'selected' : ''}>Aguardando</option>
              <option value="Confirmado" ${g.status === 'Confirmado' ? 'selected' : ''}>Confirmado</option>
              <option value="Cancelado" ${g.status === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
            </select>
            <button class="btn-del" onclick="removeGuest(${i})">&times;</button>
          </div>
        `;
        listG.appendChild(li);
      });

      // Lista de Cardápio
      const listM = document.getElementById("list-menu");
      listM.innerHTML = "";
      AppData.menu.forEach((item, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <span class="item-title">${item}</span>
          <button class="btn-del" onclick="removeMenu(${i})">&times;</button>
        `;
        listM.appendChild(li);
      });

      // Lista de Decoração
      const listD = document.getElementById("list-decor");
      listD.innerHTML = "";
      AppData.decor.forEach((item, i) => {
        const li = document.createElement("li");
        li.className = "item-row";
        li.innerHTML = `
          <span class="item-title">${item}</span>
          <button class="btn-del" onclick="removeDecor(${i})">&times;</button>
        `;
        listD.appendChild(li);
      });
    }
  </script>
</body>
</html>
